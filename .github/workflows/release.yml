name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk Jules.apk

      - name: Create Release and Upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the tag name if triggered by push, otherwise use a timestamp
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION_TAG="${{ github.ref_name }}"
          else
            VERSION_TAG="manual-$(date +'%Y%m%d-%H%M%S')"
          fi
          
          gh release create "$VERSION_TAG" \
            Jules.apk \
            --title "Release $VERSION_TAG" \
            --notes "Automated release build for $VERSION_TAG"
